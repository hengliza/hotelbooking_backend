name: Deploy Spring Boot Backend

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/hotel-booking-backend

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: hotelbooking
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: qwer
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          
      - name: Run Tests
        run: mvn -B test --file pom.xml

      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

      - name: Build Image
        run: |
          docker build -t $IMAGE_NAME:latest .

      - name: Push Image
        run: |
          docker push $IMAGE_NAME:latest

      - name: Copy k8s manifests
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "k8s/deployment.yaml"
          target: "/tmp/spring-backend"

      - name: Deploy Server
        uses: appleboy/ssh-action@v1
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: JWT_SECRET,DATABASE_URL,DATABASE_USERNAME,DATABASE_PASSWORD,DOCKERHUB_USERNAME
          script: |
            IMAGE_NAME=$DOCKERHUB_USERNAME/hotel-booking-backend:latest
            
            # Replace placeholder with actual image name
            sed -i "s|REPOSITORY/IMAGE_NAME:TAG|$IMAGE_NAME|g" /tmp/spring-backend/k8s/deployment.yaml
            
            # Create or update Kubernetes secret safely
            sudo /usr/local/bin/kubectl create secret generic backend-secrets \
              --from-literal=JWT_SECRET="$JWT_SECRET" \
              --from-literal=DATABASE_URL="$DATABASE_URL" \
              --from-literal=DATABASE_USERNAME="$DATABASE_USERNAME" \
              --from-literal=DATABASE_PASSWORD="$DATABASE_PASSWORD" \
              --dry-run=client -o yaml | sudo /usr/local/bin/kubectl apply -f -
            
            # Apply to Kubernetes cluster
            sudo /usr/local/bin/kubectl apply -f /tmp/spring-backend/k8s/deployment.yaml

