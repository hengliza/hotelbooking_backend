# Local Dev Database Config
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/hotelbooking
spring.datasource.username=postgres
spring.datasource.password=qwer

# Dev JPA Console Logging Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Media Server File Upload Paths
media.server-path=C:/hotel-booking-backend/uploads/
media.base-uri=http://localhost:8080/api/medias/download/